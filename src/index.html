<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Task Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Sidebar ─────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span class="logo-text">TaskFlow</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">VIEWS</div>
      <button class="nav-item active" data-view="kanban">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1.5"/><rect x="14" y="3" width="7" height="10" rx="1.5"/></svg>
        Kanban Board
      </button>
      <button class="nav-item" data-view="list">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
        List View
      </button>

      <div class="nav-section-label">FILTERS</div>
      <button class="nav-item filter-item active-filter" data-priority="all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
        All Tasks
      </button>
      <button class="nav-item filter-item" data-priority="high">
        <span class="priority-dot high"></span>
        High Priority
      </button>
      <button class="nav-item filter-item" data-priority="medium">
        <span class="priority-dot medium"></span>
        Medium Priority
      </button>
      <button class="nav-item filter-item" data-priority="low">
        <span class="priority-dot low"></span>
        Low Priority
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="stats" id="stats">
        <div class="stat"><span class="stat-num" id="stat-total">0</span> Total</div>
        <div class="stat"><span class="stat-num" id="stat-done">0</span> Done</div>
      </div>
    </div>
  </aside>

  <!-- ── Main Content ────────────────────────────── -->
  <main class="main">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Tasks</h1>
        <div class="view-tabs">
          <button class="tab active" data-view="kanban">Kanban view</button>
          <button class="tab" data-view="list">List view</button>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search tasks..." />
        </div>
        <button class="btn-primary" id="btnCreateTask">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create Task
        </button>
      </div>
    </header>

    <!-- Kanban Board -->
    <div class="board" id="kanbanBoard">
      <div class="column" data-status="todo">
        <div class="column-header">
          <div class="column-title"><span class="column-dot todo"></span> TO DO <span class="column-count" id="count-todo">0</span></div>
          <button class="btn-add-card" data-status="todo" title="Add task">+</button>
        </div>
        <div class="card-list" id="list-todo"></div>
      </div>

      <div class="column" data-status="inprogress">
        <div class="column-header">
          <div class="column-title"><span class="column-dot inprogress"></span> IN PROGRESS <span class="column-count" id="count-inprogress">0</span></div>
          <button class="btn-add-card" data-status="inprogress" title="Add task">+</button>
        </div>
        <div class="card-list" id="list-inprogress"></div>
      </div>

      <div class="column" data-status="done">
        <div class="column-header">
          <div class="column-title"><span class="column-dot done"></span> DONE <span class="column-count" id="count-done">0</span></div>
          <button class="btn-add-card" data-status="done" title="Add task">+</button>
        </div>
        <div class="card-list" id="list-done"></div>
      </div>
    </div>

    <!-- List View -->
    <div class="list-view hidden" id="listView">
      <table class="task-table">
        <thead>
          <tr>
            <th>Task</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </main>

  <!-- ── Create / Edit Task Modal ────────────────── -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Create Task</h2>
        <button class="btn-close" id="btnCloseModal">&times;</button>
      </div>
      <form id="taskForm">
        <div class="form-group">
          <label for="inputTitle">Title</label>
          <input type="text" id="inputTitle" placeholder="Enter task title..." required />
        </div>
        <div class="form-group">
          <label for="inputDesc">Description</label>
          <textarea id="inputDesc" rows="3" placeholder="Enter description (optional)"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="inputPriority">Priority</label>
            <select id="inputPriority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label for="inputStatus">Status</label>
            <select id="inputStatus">
              <option value="todo">To Do</option>
              <option value="inprogress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btnCancel">Cancel</button>
          <button type="submit" class="btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Delete Confirmation Modal ───────────────── -->
  <div class="modal-overlay hidden" id="deleteOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Delete Task</h2>
        <button class="btn-close" id="btnCloseDelete">&times;</button>
      </div>
      <p class="delete-msg">Are you sure you want to delete this task? This action cannot be undone.</p>
      <div class="form-actions">
        <button class="btn-secondary" id="btnCancelDelete">Cancel</button>
        <button class="btn-danger" id="btnConfirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
